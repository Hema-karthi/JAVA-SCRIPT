<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> variables var, let, const</h1>
    <h2>variables with string, number, boolean, null, undefined</h2>

    <script>
        //var 
        var x = 8;
        var y = 9;
        var z = x+y;
        console.log( " value of x=" +x );
        console.log( " value of x=" +y );
        console.log( " value of x=" +z );
        //using let and const with number and  string
        {
            let y = 20;
            console.log(y);
        }
        {
            let y =20;
            console.log(y);

            const country = "India";
            console.log(country);
        }
        //using boolean ,null and undefined
        {
            let isStudent ="true"
            console.log(isStudent)

            let address = null;
            console.log(address);
            
            let phoneNumber;
            console.log(phoneNumber);





        }
        


</script>
    
</body>
</html>
