<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <script>
    //for loop
    for( let i=1; i<=10; i++){
        console.log("number:",i);
    }
    //while loop

     let i = 1;
     while (i<=5 ){
        console.log("whilenumber :",i);
        i++;
     }
    
     //do while loop
     let k =1;
     do{
        console.log(" donumber :",k);
        k++;
     } while (k<=3);

     //using skip break

     for( let j=1; j<=10; j++){
        if( j === 5){
            continue;
        }
        if(j === 9){
            break;
        }
        console.log("number",j);
     }




  </script>
</body>
</html>
