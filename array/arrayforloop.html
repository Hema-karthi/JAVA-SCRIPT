<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2> Students List</h2>
    <button onclick="showStudentsName()"> students Name </button>
    <p id="list"></p>
    <script>
        let students = ["karthik","Hema","Archana","Gokulan","Aadhya","Lakshana"];
        function showStudentsName(){
              let result = "";
            for( let i = 0 ; i<students.length ;i++){
                result += students[i]+"<br>";
            }
                document.getElementById("list").innerHTML=result;
            
        }
    </script>
</body>
</html>
