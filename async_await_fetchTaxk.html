<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <h2> uisng AWAIT ASYNC PROMISE CODE </h2>
    <button onclick="fetchWithAsync()"> fetching</button>
    <pre id="output"></pre>

    <script>
    async function fetchWithAsync(){
        const output= document.getElementById("output");
        output.textContent = "fetching data from API.........\n\n\n";

        try{
            const response = await fetch ("https://jsonplaceholder.typicode.com/users/1");
            const data = await response.json();
            output.textContent += JSON.stringify(data,null,2)+"\n";

        }
        catch(error){
            output.textContent = "ERROR:" + error;
        }
    /*  finally{
            output.textContent = "\n\n ----\n operation completed (final block),"; 
        }
*/
    }
    </script>
</body>
</html>
